name: talent_find
description: "TalentTrack - Sports Authority of India Talent Assessment Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI and Fonts
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.8

  tflite_flutter: ^0.11.0
  image: ^4.5.4
  video_player: ^2.10.0
  camera: ^0.11.2
  path_provider: ^2.1.5
  file_picker: ^10.3.3
  ffmpeg_kit_flutter: ^6.0.3

  # Firebase Core (required for all Firebase services)
  firebase_core: ^3.6.0

  provider: ^6.1.2

  http: ^1.2.2  # For API calls
  url_launcher: ^6.3.1

  # Firebase Authentication
  firebase_auth: ^5.3.1

  # Cloud Firestore (for database)
  cloud_firestore: ^5.4.3

  # Google Sign In (compatible with firebase_auth 5.3.1)
  google_sign_in: ^6.2.1

  universal_html: ^2.2.4

  # Note: firebase_storage removed - not needed for current MVP
  # We can add it later when implementing file uploads

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ml_models/


fonts:
  - family: Roboto
    fonts:
      - asset: fonts/Roboto-Regular.ttf
      - asset: fonts/Roboto-Bold.ttf
        weight: 700
      - family: Poppins
        fonts:
          - asset: fonts/Poppins-Regular.ttf
          - asset: fonts/Poppins-Bold.ttf
            weight: 700